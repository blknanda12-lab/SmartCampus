kind = "web"
previewPath = "/"
title = "Smart Campus"
version = "1.0.0"
id = "artifacts/smart-campus"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21691

[services.development]
run = "pnpm --filter @workspace/smart-campus run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-campus", "run", "build" ]
publicDir = "artifacts/smart-campus/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21691"
BASE_PATH = "/"
